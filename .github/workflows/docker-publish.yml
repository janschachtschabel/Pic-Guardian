name: Build & Push Docker image

# Baut das Single-Container-Image und pusht es zu Docker Hub.
#
# Voraussetzungen (Repo -> Settings -> Secrets and variables -> Actions):
#   Secret  DOCKERHUB_USERNAME  = Docker-Hub-Benutzername
#   Secret  DOCKERHUB_TOKEN     = Docker-Hub Access Token (Account Settings -> Security)
# Das Image heißt dann  <DOCKERHUB_USERNAME>/pic-guardian.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}

env:
  IMAGE_NAME: pic-guardian

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Zusätzliche Plattform bei Bedarf ergänzen: linux/amd64,linux/arm64
          # (arm64 baut das Frontend unter QEMU deutlich langsamer).
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
